spring.application.name=query-practice

# ---- Banco H2 em memoria: sobe SEMPRE do zero, com os mesmos dados ----
spring.datasource.url=jdbc:h2:mem:querydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate recria o schema a cada inicializacao
spring.jpa.hibernate.ddl-auto=create

# Garante que o data.sql rode DEPOIS que o Hibernate cria as tabelas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Mostra o SQL gerado no console (otimo para aprender!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console web do H2 para inspecionar os dados: http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:mem:querydb | user: sa | senha em branco)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
